# verdi-evidence (spec/remote-and-ci; PLAN.md invention ledger I-8; 03
# §Evidence records): the CI trust root spec/true-closure#ac-1 depends on.
#
# Runs the CI-provenance producer (`verdi sync --produce`, dc-1) and
# uploads the resulting data/derived/<ref-slug>/<commit>/ tree as this
# workflow's own artifact, named exactly "verdi-evidence" — the fixed I-8
# convention internal/forge/github's defaultArtifactName (and
# internal/forge/gitlab's defaultJobName, for a GitLab-hosted store) keys
# its fetch on. `verdi sync` (no flags) and, later, `verdi gate`/`matrix`/
# `rollup` fetch this artifact BACK through the forge port by (ref,
# commit) — a bundle is authoritative because it was fetched that way,
# never merely because this job ran (dc-1: "authoritative solely because
# it is fetched back from the forge artifact store ... not because the
# flag was passed").
#
# Runs on the same triggers as verify.yml (every push and PR, no path
# filter) so every commit that could gate has an evidence bundle to fetch
# once it lands — cheap to run unconditionally (a Go build plus the
# producer; no lint/test/e2e), unlike verify.yml/spec-gate.yml's
# path-filtered split (Phase 4), which is about gating cost, not evidence
# production.
#
# Kept in its own workflow file, deliberately not folded into verify.yml:
# verify.yml's own comment says it "should not need to change" as make
# verify grows, and this job's job is producing evidence, never gating —
# `make verify`, run only by verify.yml, is still exactly what CI gates on
# (CLAUDE.md: "CI runs exactly `make verify` — trust parity").
#
# --force-local is deliberately NEVER passed here: a real Actions run
# always satisfies internal/lint.ReadCIEnv().InCI (GitHub Actions sets
# GITHUB_ACTIONS=true), so `verdi sync --produce`'s CI-only guard passes
# on its own — the override exists solely for local developer testing
# (cmd/verdi/sync.go's runProduce doc comment).
name: verdi-evidence

on:
  push:
  pull_request:

jobs:
  verdi-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build -o .build/verdi ./cmd/verdi
      - name: "Produce the CI-provenance evidence bundle (source: ci)"
        run: ./.build/verdi sync --produce
      - uses: actions/upload-artifact@v4
        with:
          name: verdi-evidence
          path: .verdi/data/derived/
          if-no-files-found: error
