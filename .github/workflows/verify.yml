# Trust parity (CLAUDE.md): CI runs exactly `make verify` for everything
# `make verify` itself gates — that part grows only insofar as `make
# verify` grows (PLAN.md §2), this file should not need to change for it.
#
# Phase 4 adds one explicit step beyond `make verify`: `make verify`'s own
# `lint-store` target already runs `verdi lint` against this repo locally
# (no CI environment), which is enough to prove the binary and the store
# both lint clean. Running it again here, in the real GitHub Actions
# environment, additionally exercises I-14's CI-context lint baselines
# (VL-004's default-branch gate, VL-010's diff base) against a real
# GITHUB_BASE_REF value on pull_request events, which a local run has no
# way to supply.
#
# Wave 7: `make verify` now ends with `make e2e` (Playwright), which is a
# HARD FAILURE without Node — CLAUDE.md's testing regime made e2e a merge
# blocker, so this job installs Node + the Playwright browser (chromium
# only, per e2e/playwright.config.ts) BEFORE `make verify` runs, keeping
# local/CI parity real rather than nominal.
#
# This job also installs golangci-lint at the Makefile's pin BEFORE `make
# verify`, so its `make lint` step gates for real (the lint target hard-
# fails when CI=true and the binary is absent). This is the only workflow
# that runs `make verify`; pages.yml only builds the dex site (no lint), so
# it needs no linter. golangci-lint's version must stay in lockstep with
# Makefile's GOLANGCI_LINT_VERSION.
name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Caches ~/.npm keyed on e2e/package-lock.json — actions/setup-node's
          # built-in npm cache, cheaper than hand-rolling actions/cache for
          # the same thing. Does NOT cache the downloaded Playwright browser
          # binaries themselves (~/.cache/ms-playwright); add an
          # actions/cache step keyed on e2e/package-lock.json's hash over
          # that path if `npx playwright install` becomes a measurable chunk
          # of CI time — skipped for now since this is the wave-7 wiring
          # pass, not a CI-performance pass.
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      # golangci-lint gate: cache then install the pinned linter (must match
      # Makefile's GOLANGCI_LINT_VERSION) so `make verify`'s lint step runs
      # the real linter. The cache key pins the version, so a hit restores the
      # exact binary and the install is a no-op; a miss builds it once.
      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-${{ runner.os }}-v2.5.0
      - name: Install golangci-lint (pinned)
        run: |
          test -x "$(go env GOPATH)/bin/golangci-lint" || \
            go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: make verify
      - run: go build -o .build/verdi ./cmd/verdi
      - run: ./.build/verdi lint
