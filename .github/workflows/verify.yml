# Trust parity (CLAUDE.md): CI runs exactly `make verify`, nothing more,
# nothing less, so a green local run is a green CI run. Grows only insofar
# as `make verify` itself grows (PLAN.md §2) — this file should not need to.
name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: make verify
