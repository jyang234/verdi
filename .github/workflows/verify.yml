# Trust parity (CLAUDE.md): CI runs exactly `make verify` for everything
# `make verify` itself gates — that part grows only insofar as `make
# verify` grows (PLAN.md §2), this file should not need to change for it.
#
# Phase 4 adds one explicit step beyond `make verify`: `make verify`'s own
# `lint-store` target already runs `verdi lint` against this repo locally
# (no CI environment), which is enough to prove the binary and the store
# both lint clean. Running it again here, in the real GitHub Actions
# environment, additionally exercises I-14's CI-context lint baselines
# (VL-004's default-branch gate, VL-010's diff base) against a real
# GITHUB_BASE_REF value on pull_request events, which a local run has no
# way to supply.
#
# Wave 7: `make verify` now ends with `make e2e` (Playwright), which is a
# HARD FAILURE without Node — CLAUDE.md's testing regime made e2e a merge
# blocker, so this job installs Node + the Playwright browser (chromium
# only, per e2e/playwright.config.ts) BEFORE `make verify` runs, keeping
# local/CI parity real rather than nominal.
#
# This job also installs golangci-lint at the Makefile's pin BEFORE `make
# verify`, so its `make lint` step gates for real (the lint target hard-
# fails when CI=true and the binary is absent). This is the only workflow
# that runs `make verify`; pages.yml only builds the dex site (no lint), so
# it needs no linter. golangci-lint's version must stay in lockstep with
# Makefile's GOLANGCI_LINT_VERSION.
#
# Phase 4 (spec-only vs code CI differentiation): path-filtered to code
# paths only — a spec/doc-only PR touches none of these and gets
# spec-gate.yml's fast check instead, never full `make verify`; a PR
# touching both gets both workflows, since this filter still matches.
#
# Round 6 (spec/close-verb ac-3, dc-1): this job now ALSO does what the
# formerly-separate verdi-evidence.yml workflow did (produce + upload the
# "verdi-evidence" artifact), folded in as the LAST two steps below, after
# `./.build/verdi lint`. Why folded in rather than left as its own workflow:
#
#   - The self-hosted evidence producer (cmd/verdi/selfevidence.go) binds
#     verdi's own make-verify outcome as static/behavioral evidence, and its
#     honesty rests entirely on being invoked strictly AFTER `make verify`
#     already exited 0 in the SAME job — never a second, independent
#     make-verify run that could disagree with the real (blocking) gate. A
#     separate workflow either re-runs make verify itself (a forbidden
#     divergent re-run — see selfevidence.go's package doc) or requires
#     fragile cross-workflow signaling (workflow_run, artifact hand-off)
#     just to learn "did the other workflow's make verify pass yet".
#   - Two workflows both uploading an artifact literally named
#     "verdi-evidence" for the same commit is itself ambiguous:
#     internal/forge/github's FetchEvidenceBundle tries every successful run
#     for a commit IN API ORDER until one carries that artifact name — with
#     two candidates it would silently pick whichever the API happens to
#     list first, not "the real one".
#
# Disclosed consequence (a deviation from remote-and-ci's original
# two-workflow delivery, flagged for `verdi align`/`verdi accept`
# disposition): evidence production is now path-filtered exactly like this
# job (verify.yml's own `paths:` above), not unconditional on every push the
# way the old verdi-evidence.yml was. This repo has no flowmap services
# (D6-4) — the self-hosted records are the ONLY evidence content this
# store's bundle has ever carried — and they are inherently code-outcome
# scoped, so a doc/spec-only commit producing no fresh evidence is honest,
# not a regression: the fold's ancestor-based "current" rule (03 §The fold)
# means an earlier code commit's evidence stays valid until a newer one
# supersedes it. verdi-evidence.yml is retired; its content lives here now.
name: verify

on:
  push:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "e2e/**"
      - ".github/workflows/**"
      - "testdata/**"
      - "scripts/**"
      - "verdi.bindings.yaml"
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "e2e/**"
      - ".github/workflows/**"
      - "testdata/**"
      - "scripts/**"
      - "verdi.bindings.yaml"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Caches ~/.npm keyed on e2e/package-lock.json — actions/setup-node's
          # built-in npm cache, cheaper than hand-rolling actions/cache for
          # the same thing. Does NOT cache the downloaded Playwright browser
          # binaries themselves (~/.cache/ms-playwright); add an
          # actions/cache step keyed on e2e/package-lock.json's hash over
          # that path if `npx playwright install` becomes a measurable chunk
          # of CI time — skipped for now since this is the wave-7 wiring
          # pass, not a CI-performance pass.
          cache: npm
          cache-dependency-path: e2e/package-lock.json
      # golangci-lint gate: cache then install the pinned linter (must match
      # Makefile's GOLANGCI_LINT_VERSION) so `make verify`'s lint step runs
      # the real linter. The cache key pins the version, so a hit restores the
      # exact binary and the install is a no-op; a miss builds it once.
      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-${{ runner.os }}-v2.5.0
      - name: Install golangci-lint (pinned)
        run: |
          test -x "$(go env GOPATH)/bin/golangci-lint" || \
            go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: make verify
      - run: go build -o .build/verdi ./cmd/verdi
      - name: "TEMP DIAGNOSTIC (P2-10b repro; remove before merge): git state before lint"
        run: |
          echo "HEAD=$(git rev-parse HEAD)"
          echo "shallow=$(git rev-parse --is-shallow-repository)"
          echo "object-type=$(git cat-file -t cdc4154dd70e08667d0b820c529486607244f16e 2>&1 || true)"
          git merge-base --is-ancestor cdc4154dd70e08667d0b820c529486607244f16e HEAD && echo "ancestor=yes" || echo "ancestor=no(exit=$?)"
          git rev-parse --verify -q cdc4154dd70e08667d0b820c529486607244f16e^{commit} && echo "revparse=ok" || echo "revparse=fail(exit=$?)"
          echo "branch-state:"; git branch -a --contains cdc4154dd70e08667d0b820c529486607244f16e 2>&1 | head -5 || true
      - run: ./.build/verdi lint
      - name: "Produce the CI-provenance evidence bundle (source: ci), incl. verdi's own self-hosted static/behavioral evidence"
        run: ./.build/verdi sync --produce
      - uses: actions/upload-artifact@v4
        with:
          name: verdi-evidence
          path: .verdi/data/derived/
          if-no-files-found: error
