# Trust parity (CLAUDE.md): CI runs exactly `make verify` for everything
# `make verify` itself gates — that part grows only insofar as `make
# verify` grows (PLAN.md §2), this file should not need to change for it.
#
# Phase 4 adds one explicit step beyond `make verify`: `make verify`'s own
# `lint-store` target already runs `verdi lint` against this repo locally
# (no CI environment), which is enough to prove the binary and the store
# both lint clean. Running it again here, in the real GitHub Actions
# environment, additionally exercises I-14's CI-context lint baselines
# (VL-004's default-branch gate, VL-010's diff base) against a real
# GITHUB_BASE_REF value on pull_request events, which a local run has no
# way to supply.
name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: make verify
      - run: go build -o .build/verdi ./cmd/verdi
      - run: ./.build/verdi lint
