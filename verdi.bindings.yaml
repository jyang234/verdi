schema: verdi.bindings/v1
# This is the STORE-ROOT self-hosted evidence sidecar (spec/close-verb
# ac-3, dc-1) — sibling of .verdi/, NOT nested inside any .flowmap.yaml
# service root, because the verdi repo is not a flowmap service of itself
# (D6-4). See cmd/verdi/selfevidence.go's package doc for the producer that
# consumes this file: it binds `make verify`'s own pass, witnessed only by
# having been reached as a step AFTER make verify succeeded in the SAME CI
# job (verify.yml), never a divergent re-run.
#
# `spec:` names the primary/owning spec for this file's bare ac-<slug>
# entries (03 §Declarations and binding); other self-hosted stories' ACs
# are named via the fragment-qualified spec/<name>#<ac-id> form
# (artifact.ResolveBindingAC) — here, remote-and-ci#ac-1, the candidate
# real merged story close-verb's own ac-1 names as the demonstration target.
spec: spec/close-verb
bindings:
  - producer: verdi-verify-behavioral
    kind: behavioral
    acs:
      - ac-1
      # close-verb ac-2 (its own [behavioral, attestation] AC): the closed
      # story's rollup publishes to the tracker and reads back — proven by
      # close_test.go / close_runtime_test.go's PublishedField assertions,
      # part of make verify's suite. Its attestation leg is authored at
      # .verdi/attestations/jira-verdi-2/ac-2.md.
      - ac-2
      - ac-3
      - "spec/remote-and-ci#ac-1"
      - "spec/remote-and-ci#ac-2"
      - "spec/remote-and-ci#ac-3"
      # spec/feature-supersession-state (true-closure#ac-4): ac-1 declares
      # [static, behavioral], ac-2 declares [behavioral]. Behavioral leg =
      # the accept-flip tests (TestFlipPredecessorToSuperseded_*, ritual),
      # the matrix/dex/board render tests, and the board e2e — all under
      # make verify.
      - "spec/feature-supersession-state#ac-1"
      - "spec/feature-supersession-state#ac-2"
      # spec/runtime-evidence (true-closure#ac-3): both ACs declare
      # evidence: [static, behavioral]. The behavioral leg is the
      # internal/runtime + fold + close_runtime tests (probe emits a
      # well-formed (story,AC)-keyed record a query returns; a story
      # declaring evidence:[runtime] folds pending->evidenced from a
      # source:ci record) — all part of make verify's own test suite.
      - "spec/runtime-evidence#ac-1"
      - "spec/runtime-evidence#ac-2"
      # spec/code-health wave stories (all merged to main). fail-loud's
      # behavioral legs: the specalign repo-hygiene red->green witness, the
      # cascadecheck unreadable-spec exit-2 test, the wrapped-sentinel 404
      # test, the runtimeprobe fail-verdict pin, mcpserve's unknown-field
      # refusals and ServeConn trace tests -- all under make verify.
      - "spec/fail-loud#ac-1"
      - "spec/fail-loud#ac-2"
      - "spec/fail-loud#ac-3"
      # forge-transport behavioral legs: contract suites unchanged over the
      # seam, multi-page drain witnesses (unresolved thread past 100), the
      # stall-timeout and 429 witnesses, and the toolchain.json pin
      # accept/refuse/disclose tests -- all under make verify.
      - "spec/forge-transport#ac-1"
      - "spec/forge-transport#ac-2"
      - "spec/forge-transport#ac-3"
      - "spec/forge-transport#ac-4"
      # shared-homes behavioral legs: atomicfile table tests + green
      # consumer suites, the pinned digest golden, the 15-case quote
      # equivalence table, the reaffirmation-indexed witness, and the
      # scaffold byte-pin -- all under make verify.
      - "spec/shared-homes#ac-1"
      - "spec/shared-homes#ac-2"
      - "spec/shared-homes#ac-3"
      - "spec/shared-homes#ac-4"
      - "spec/shared-homes#ac-5"
      # spec/file-topics behavioral legs: the untouched cmd/verdi suites
      # over the verbatim moves (ac-1/ac-2), the module-wide suites over
      # the runtimeprobe rename (ac-3), and the full e2e gate through the
      # reworked harness plus the runGit/copyTree unit tests (ac-4) -- all
      # under make verify.
      - "spec/file-topics#ac-1"
      - "spec/file-topics#ac-2"
      - "spec/file-topics#ac-3"
      - "spec/file-topics#ac-4"
      # spec/evidence-obligations stories (obligation-artifact/gate/wall):
      # behavioral legs = the decode/round-trip, VL-019/VL-020 lint, matrix
      # render, and board graduation/render tests + e2e, all under make
      # verify. Plus the FEATURE evidence-obligations#ac-1..4 behavioral leg
      # (the whole obligation mechanism proven by make verify's suite).
      - "spec/obligation-artifact#ac-1"
      - "spec/obligation-artifact#ac-2"
      - "spec/obligation-artifact#ac-3"
      - "spec/obligation-gate#ac-1"
      - "spec/obligation-gate#ac-2"
      - "spec/obligation-wall#ac-1"
      - "spec/obligation-wall#ac-2"
      - "spec/evidence-obligations#ac-1"
      - "spec/evidence-obligations#ac-2"
      - "spec/evidence-obligations#ac-3"
      - "spec/evidence-obligations#ac-4"
      # spec/ref-index behavioral legs (all 5 ACs declare [static,
      # behavioral]): internal/refindex/refindex_test.go's fixturegit
      # suite — TestComputeIndex_OneEntryPerSpecOrDraft_MergedBranchExcluded
      # (ac-1: N+M entries, no dup/drop, dc-5's merged-branch exclusion,
      # determinism), TestComputeIndex_Sources (ac-2: local/remote/both
      # Source values, one entry for a both-sourced branch),
      # TestComputeIndex_StatusGroups (ac-3: mixed default-branch statuses
      # + an unconditionally drafts-in-progress design draft, deterministic
      # across two calls), TestComputeIndex_DisclosedNoDraftSpec (ac-4: a
      # branch cut but never given a spec.md yields nil error + one
      # disclosed entry), TestComputeIndex_NeverMovesHEAD (ac-5: HEAD/
      # working-tree byte-identical before and after) — plus
      # fake_test.go's in-process GitRunner-double unit tests (dc-2's port
      # pattern) and the two new gitx primitives' own tests
      # (gitx/lstree_test.go, gitx/remotedesignbranches_test.go). All under
      # make verify.
      - "spec/ref-index#ac-1"
      - "spec/ref-index#ac-2"
      - "spec/ref-index#ac-3"
      - "spec/ref-index#ac-4"
      - "spec/ref-index#ac-5"
      # spec/proposal-artifact (diagram-proposals ac-2/ac-6) behavioral
      # legs, all under make verify:
      # ac-1: internal/artifact/diagram_test.go's TestDecodeDiagram_Proposal
      # (obligation ac-1--behavioral's full 7-case table) plus
      # TestDiagramDerivedFrom_Negative/_DanglingRefAndMalformedDigestDecodeClean.
      # ac-2: cmd/verdi/acceptdiagram_test.go's
      # TestRunAccept_Diagram_ByteIdentityRegression (SHA-256 body-identity
      # regression over the accept ritual's frontmatter-only flip).
      # ac-3: cmd/verdi/acceptdiagram_test.go's TestRunAccept_Diagram_Happy
      # plus the three refusal tests (incumbent, already-accepted,
      # unresolved target) — ac-3 is behavioral-only, no static leg.
      # ac-4: internal/artifact/diagram_test.go's
      # TestDiagramDisclosedStatus (the full input table) plus
      # TestDecodeDiagram_RealizedStaleRejected (decode-rejects
      # status: realized/stale).
      # ac-5: internal/lint/vl021_test.go's TestVL021_DanglingRef/
      # _MalformedDigest/_Clean/_IncumbentDiagramIgnored.
      - "spec/proposal-artifact#ac-1"
      - "spec/proposal-artifact#ac-2"
      - "spec/proposal-artifact#ac-3"
      - "spec/proposal-artifact#ac-4"
      - "spec/proposal-artifact#ac-5"
      # spec/verification-extractor (diagram-proposals ac-1) behavioral
      # legs, all under make verify, internal/diagramverify:
      # ac-1: grammar_test.go's TestParse_Pristine_FullCoverage (every
      # edge form, both node forms, a %% comment, and a classDef/
      # :::classname assignment -> full coverage), TestParse_
      # OutOfGrammarConstruct_DowngradesWholeArtifact (a subgraph block ->
      # whole-artifact partial, recognized lines still extract), and
      # TestParse_IdentityCollision_DowngradesWholeArtifact (two truth
      # FQNs colliding on ShortName -> partial).
      # ac-2: truth_test.go's TestRegenerateTruth_Unscoped/_Scoped (the
      # fake Runner observes an -entry flag only when scope is non-empty)
      # and TestRegenerateTruth_Negative_OperationalError (a non-zero fake
      # exit surfaces as an error), all over upstream.FakeRunner + the
      # canned testdata/svcfix-canned/graph.json capture.
      # ac-3: compare_test.go's TestCompare_ThreeWayTable (exists/
      # proposed-new/kept-but-gone), TestCompare_Rename_TwoIndependentFacts
      # (a dropped+added pair renders as kept-but-gone + proposed-new, never
      # one fact), and the fixturegit-backed TestCompareWithWitness_Resolved/
      # _Unresolved (a scripted repo history's removal commit resolves as
      # candidate witness; an untouched identity discloses unresolved).
      # ac-4: stale_test.go's TestStaleBase_MatchingDigest_NoStaleness/
      # _MismatchedDigest_Stale plus TestStaleBase_IndependentOfThreeWayComparison
      # (a 2x2 table over stale x residual proving the two checks vary
      # independently).
      - "spec/verification-extractor#ac-1"
      - "spec/verification-extractor#ac-2"
      - "spec/verification-extractor#ac-3"
      - "spec/verification-extractor#ac-4"
      # spec/worktree-manager behavioral legs (all five ACs declare
      # [static, behavioral]): ac-1 = TestEnsureWorktree_FirstCallCutsReal
      # Worktree + TestEnsureWorktree_SecondCallReusesNoRecut
      # (internal/wtmanager); ac-2 = TestEnsureWorktree_Negative_
      # RemoteTrackingOnly/_NonexistentBranch/_AlreadyCheckedOutHere; ac-3
      # = TestEnsureWorktree_Concurrent_ExactlyOneCut +
      # TestGC_ConcurrentLiveLockSurvivesGC; ac-4 =
      # TestGC_FourWorktrees_EachRatifiedOutcome +
      # TestGC_DeletedBranchSignal_LocalOnly; ac-5 =
      # TestGc_CLI_ReclaimsAndDisclosesScope/_KeepsDirtyAndDiscloses
      # (cmd/verdi, driving the built binary) + TestRun_
      # GcDispatchesToRealVerb + specalign's TestV0CLIVerbInventory
      # real_gc case -- all under make verify.
      - "spec/worktree-manager#ac-1"
      - "spec/worktree-manager#ac-2"
      - "spec/worktree-manager#ac-3"
      - "spec/worktree-manager#ac-4"
      - "spec/worktree-manager#ac-5"
      # spec/badge-computes behavioral legs, all under make verify:
      # ac-1 = workbench's TestAttachBadges_SameAcrossPageFragmentAndLoad-
      # Projection (one attachment feeds page, fragment, get_board's
      # LoadProjection identically); ac-2 = TestAttachBadges_VLPartition +
      # wallbadge's VLBadges tables (object-anchored / spec-level /
      # no-locus fail-closed); ac-3 = wallbadge's ladder tables (flagged /
      # proven-unflagged / disclosed-unproven) + TestAttachBadges_Pending-
      # SupersessionDisclosedUnproven + the cmd/verdi + mcpserve
      # supersessionfeed adapter tables; ac-4 = wallbadge's determinism
      # test (byte-identical JSON across two renders); ac-5 = the
      # 37-board-wall-badges.spec.ts Playwright suite (chips + case-file
      # stamps in authoring/review/read-only, data-badge-source +
      # data-badge-record on every badge button, a write path succeeding
      # on a badged wall) + workbench's TestRenderBadges tables.
      - "spec/badge-computes#ac-1"
      - "spec/badge-computes#ac-2"
      - "spec/badge-computes#ac-3"
      - "spec/badge-computes#ac-4"
      - "spec/badge-computes#ac-5"
  - producer: verdi-verify-static
    kind: static
    acs:
      - ac-3
      - "spec/remote-and-ci#ac-1"
      # spec/feature-supersession-state ac-1 static leg: the flip logic and
      # its VL-010 status-only-exception compatibility compile, vet, and
      # lint-store clean under make verify.
      - "spec/feature-supersession-state#ac-1"
      # spec/runtime-evidence static leg: the verdi.evidence/v1 record
      # schema and this binding are declared and strict-decoded (they
      # compile, vet, and lint-store clean under make verify), and
      # LoadRecords' runtime.json wiring is statically sound.
      - "spec/runtime-evidence#ac-1"
      - "spec/runtime-evidence#ac-2"
      # spec/code-health wave stories' static legs: the gate/refusal code,
      # seam packages (httpjson, atomicfile, canonjson.Digest,
      # artifact.ClassifyPath/YAMLDoubleQuote), strict decodes, and doc
      # contracts compile, vet, lint, and lint-store clean under make
      # verify; fail-loud ac-4 is static-only (stated contracts + corrected
      # counts + the VL-019 registry row).
      - "spec/fail-loud#ac-1"
      - "spec/fail-loud#ac-2"
      - "spec/fail-loud#ac-3"
      - "spec/fail-loud#ac-4"
      - "spec/forge-transport#ac-1"
      - "spec/forge-transport#ac-2"
      - "spec/forge-transport#ac-3"
      - "spec/forge-transport#ac-4"
      - "spec/shared-homes#ac-1"
      - "spec/shared-homes#ac-2"
      - "spec/shared-homes#ac-3"
      - "spec/shared-homes#ac-4"
      - "spec/shared-homes#ac-5"
      # spec/file-topics static legs: the relocated files, the renamed
      # package with zero stragglers, and the harness's ctx/timeout/signal
      # wiring compile, vet, lint, and lint-store clean under make verify.
      - "spec/file-topics#ac-1"
      - "spec/file-topics#ac-2"
      - "spec/file-topics#ac-3"
      - "spec/file-topics#ac-4"
      # spec/evidence-obligations stories' static legs: the obligation kind
      # + VL-019/VL-020 rules + the loader are declared and compile/vet/
      # lint-store clean under make verify.
      - "spec/obligation-artifact#ac-1"
      - "spec/obligation-artifact#ac-2"
      - "spec/obligation-gate#ac-1"
      - "spec/obligation-gate#ac-2"
      # spec/proposal-artifact static legs (ac-3 declares [behavioral] only
      # and has no entry here): ac-1's DiagramFrontmatter.Class/Scope/
      # DerivedFrom fields and the class-conditioned Validate branch
      # (internal/artifact/diagram.go); ac-2's write-path inventory (the
      # doc comment on cmd/verdi/acceptdiagram.go's package clause naming
      # every real diagram write path and showing each touches frontmatter
      # bytes only); ac-4's DiagramDisclosedStatus signature plus
      # proposalStatuses' absence of realized/stale (internal/artifact/
      # diagram.go, internal/artifact/status.go); ac-5's VL-021 rule
      # declaration (internal/lint/vl021.go) and its doc comment pointing
      # to VL-002's singleFileKindDir["diagram"] entry and VL-001's
      # baseline decode-cleanliness check as the "no new coverage needed"
      # evidence — all compile, vet, lint, and lint-store clean under make
      # verify.
      - "spec/proposal-artifact#ac-1"
      - "spec/proposal-artifact#ac-2"
      - "spec/proposal-artifact#ac-4"
      - "spec/proposal-artifact#ac-5"
      - "spec/obligation-wall#ac-1"
      # spec/ref-index static legs (all 5 ACs declare [static, behavioral]):
      # ComputeIndex's signature and the GitRunner port's method set are
      # read directly (internal/refindex/port.go) — ac-1/ac-5's "no
      # checkout-mutating method exists at all" claim is witnessed by
      # fake_test.go's TestGitRunner_MethodSet_ExposesNoCheckoutCapability
      # and TestGitRunner_MethodNames (reflection over the interface,
      # pinning its exact method set); ac-2's "one shared enumeration path"
      # and the closed 4-value Source enum, and ac-3's closed 4-value
      # StatusGroup enum with a fail-closed total mapping function
      # (status_test.go's TestMapStatusGroup_Negative_FailsClosed), and
      # ac-4's Disclosed field wired only through internal/disclosure.New,
      # all compile, vet, lint, and lint-store clean under make verify.
      - "spec/ref-index#ac-1"
      - "spec/ref-index#ac-2"
      - "spec/ref-index#ac-3"
      - "spec/ref-index#ac-4"
      - "spec/ref-index#ac-5"
      # spec/verification-extractor static legs (all 4 ACs declare
      # [static, behavioral]), internal/diagramverify:
      # ac-1: grammar.go's Parse enumerates the recognized token forms in
      # code (directionRe/commentRe/classDefRe/bareNodeRe/nodeDeclRes/the
      # four edge*Re regexes) and Extraction.Coverage is the single
      # whole-artifact verdict Parse returns per call (one Coverage field,
      # never a per-element slice).
      # ac-2: truth.go's RegenerateTruth is the one call site building an
      # upstream.Request{Bin: "flowmap", Subcommand: "graph", ...} with
      # -entry appended only when scope != "" — RunGraph itself
      # (internal/upstream/exec.go), extended in place with an entry
      # parameter; every pre-existing call site (cmd/verdi/sync_regen.go,
      # internal/align/computed.go) now passes "" and keeps today's argv
      # byte-identical (proven by TestGraph_Happy alongside the new
      # TestGraph_Scoped_AppendsEntryFlag).
      # ac-3: compare.go's Classification is a closed 3-value type (Exists/
      # ProposedNew/KeptButGone, no "renamed" anywhere in the type or its
      # consumers) and Result.Witness is an optional *string populated only
      # by ResolveWitness, which wraps gitx.PickaxeCommit — the only
      # commit-discovery mechanism in this story.
      # ac-4: stale.go's StaleBase calls canonjson.Digest (the same shared
      # formula every other computed digest in this codebase uses) over
      # RegenerateTruth's result and compares it to baseDigest with plain
      # string equality (!=); it is a standalone function, never invoked
      # from Compare or vice versa.
      - "spec/verification-extractor#ac-1"
      - "spec/verification-extractor#ac-2"
      - "spec/verification-extractor#ac-3"
      - "spec/verification-extractor#ac-4"
      # spec/worktree-manager static legs (all five ACs declare [static,
      # behavioral]): the extracted internal/filelock algorithm, gitx's
      # HasLocalBranch/WorktreeAdd/WorktreeRemove primitives, wtmanager's
      # EnsureWorktree (lock-before-add, local-ref gate, typed refusals)
      # and GC (decideReclaim's total four-outcome map reusing
      # gitx.IsAncestor/StatusDirty unchanged, no --force), and
      # dispatch.go's verbPhase["gc"] flip to a real, routed verb all
      # compile, vet, lint, and lint-store clean under make verify.
      - "spec/worktree-manager#ac-1"
      - "spec/worktree-manager#ac-2"
      - "spec/worktree-manager#ac-3"
      - "spec/worktree-manager#ac-4"
      - "spec/worktree-manager#ac-5"
      # spec/badge-computes static legs (ac-1..4 declare [static,
      # behavioral]; ac-5 is behavioral-only), all under make verify:
      # ac-1 = workbench's badgesstatic_test source-inspection witnesses
      # (loadBoard's single attachBadges call site after buildProjection;
      # the pure projector imports no lint/decisionsweep/evidence);
      # ac-2 = the lint.Finding.Locus seam + wallbadge's static witness
      # that no rule-id switch/map decides wall placement; ac-3 =
      # wallbadge's staticcallsites_test (the dex lens's own
      # decisionsweep.ScanSpecStale / evidence.PendingSupersession /
      # LoadPendingSupersessionCandidates / ImplementsByFeature call
      # sites, no local reimplementation); ac-4 = the one shared
      # wallbadge.DerivationRecord schema (record.go) every badge
      # constructor fills, revisions from content digests / pinned
      # fields only — plus compile/vet/lint-store clean.
      - "spec/badge-computes#ac-1"
      - "spec/badge-computes#ac-2"
      - "spec/badge-computes#ac-3"
      - "spec/badge-computes#ac-4"
