schema: verdi.layout/v1
forge: gitlab                  # or github; auto-detected from the remote URL when omitted
providers:                     # story-provider spec owns semantics
  jira:
    base_url: https://example.atlassian.net
    rollup_field: customfield_00000     # ids only; secrets come from env/CI vars
lint:
  gated_generated: []          # committed generated artifacts that are currency-gated
align:                         # evidence-model spec owns semantics
  judge_cmd: [claude, -p, --output-format, json]  # argv array (Phase 8 S5, flagged: 01 shows a string)
  judge_required: false        # true: `verdi align` fails outright without a judge
audit:                         # R4-I-10; exemption/deviation counterweights
  exempts_conflict_threshold: 3
  deviations_stale_threshold: 3
spike_paths: ["docs/spikes/**"]  # VL-016 fence; this repo's spike workspace and doc paths
derived:
  retention_days: 14           # gc horizon for merged/deleted refs
services:
  discovery: flowmap           # any directory containing .flowmap.yaml is a service root
toolchain:                     # verdi-go pin (I-4); no upstream tags yet, so pin by commit SHA
  module: github.com/jyang234/golang-code-graph
  commit: cd38b1a56bb782177a207d741a39807821cf2c1c
