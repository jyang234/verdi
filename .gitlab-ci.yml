# Trust parity (CLAUDE.md): CI runs exactly `make verify` for everything
# `make verify` itself gates — that part grows only insofar as `make
# verify` grows (PLAN.md §2), this file should not need to change for it.
#
# Phase 4 adds one explicit step beyond `make verify`: `make verify`'s own
# `lint-store` target already runs `verdi lint` against this repo locally
# (no CI environment), which is enough to prove the binary and the store
# both lint clean. Running it again here, in the real GitLab pipeline
# environment, additionally exercises I-14's CI-context lint baselines
# (VL-004's default-branch gate, VL-010's diff base) against real
# CI_DEFAULT_BRANCH / CI_MERGE_REQUEST_TARGET_BRANCH_NAME values, which a
# local run has no way to supply.
#
# Wave 7: `make verify` now ends with `make e2e` (Playwright), which is a
# HARD FAILURE without Node — CLAUDE.md's testing regime made e2e a merge
# blocker, so this job installs Node + the Playwright browser (chromium
# only, per e2e/playwright.config.ts) BEFORE `make verify` runs, keeping
# local/CI parity real rather than nominal. `golang:1.25` has no Node
# preinstalled, hence the explicit NodeSource setup below rather than a
# combined image.

variables:
  # GitLab's own npm-cache convention: cache keyed on the branch, paths
  # under the job's working dir so `cache:` below can restore/save it.
  # Does NOT cache ~/.cache/ms-playwright (the downloaded browser
  # binary) — add that path to `cache:` too if `playwright install`
  # becomes a measurable chunk of pipeline time; skipped here as this is
  # the wave-7 wiring pass, not a CI-performance pass.
  npm_config_cache: "$CI_PROJECT_DIR/.npm-cache"

verify:
  image: golang:1.25
  stage: test
  cache:
    key:
      files: [e2e/package-lock.json]
    paths:
      - .npm-cache/
  before_script:
    # golang:1.25 (Debian-based) has no Node; NodeSource's setup script is
    # the standard non-interactive way to add an apt source for a current
    # LTS and install it in one CI step.
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
  script:
    - make verify
    - go build -o .build/verdi ./cmd/verdi
    - ./.build/verdi lint

# pages (PLAN.md Phase 12, 05 §Verdi-dex): builds the static dex site from
# main's tree on every push to the default branch and publishes it to
# GitLab Pages. The job name "pages" and artifact path "public" are
# GitLab's own fixed convention — this is the entire publish contract, no
# further GitLab-specific configuration needed in-repo.
#
# I-21 / PLAN.md Phase 12 exit criteria: "member-restricted" readership is
# forge configuration, not something this pipeline can express — GitLab
# Pages has native access control for exactly this. REQUIRED PROJECT
# SETTING (do this once, outside this file): in the project's
# Settings > Deploy > Pages, set "Pages visibility" to "Only project
# members" (Premium/Ultimate: "Enforce access control can also be scoped
# further via group SSO). Without that setting, this job still runs and
# still publishes correctly — the site simply defaults to the project's
# general visibility instead of being member-restricted, which is a real
# capability gap this comment discloses rather than hides (05 §Verdi-dex:
# "readership restricted to project members ... via Pages access control").
pages:
  image: golang:1.25
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - go build -o .build/verdi ./cmd/verdi
    - ./.build/verdi dex build -o public
  artifacts:
    paths:
      - public
