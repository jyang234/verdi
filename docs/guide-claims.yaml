# guide-claims.yaml — spec/guide-claims-gate (ritual-integrity#ac-5, ledger
# L-N4). Transcribes the Integration & Startup Guide's Appendix B
# (docs/design/concepts/2026-07-17-integration-startup-guide.md, "Appendix
# B — Honesty ledger: this guide vs. today's binary") into ATOMIC capability
# rows: one row names exactly one capability, carries exactly one status,
# and binds exactly one witness set — never a bundled, multi-capability row
# (internal/artifact's DecodeGuideClaims rejects that shape at decode).
#
# The four rows Appendix B's own prose bundles several independently-
# witnessed capabilities under one status — 7.2, 6.2, 8.4, 5.3 — are
# decomposed here into their own sub-rows per the Task-0 design wave's
# adjudication (docs/design/plans/2026-07-20-extensibility-phase2-plan.md,
# ledger L-N4). Every other Appendix B line becomes exactly one row here,
# even where its own prose names more than one noun, as long as those
# nouns share one status (L-N4: "Appendix B's prose rows become display
# groupings").
#
# Every EXISTS/PARTIAL row's witnesses are bound three ways by
# internal/specalign/guideclaims_test.go: the name exists in the corpus, a
# `// guide-claim: <row-id>` anchor sits at the witness's own declaration,
# and the witness is PASS-coupled inside `make verify`. Every non-EXISTS
# row, and any row whose status is ever downgraded from a prior value,
# carries `cite:` naming a chronicle/ledger entry outside this repository
# (`<path-from-the-workspace-root>#<anchor text>`) — its presence is gated
# in CI, its resolution checked workspace-side only with a loud skip.
#
# INVENTORY-ONLY SCOPE (spec/guide-claims-gate ac-4): this manifest and its
# gate prove row-to-witness binding. They do NOT prove guide-to-row
# completeness — that every claim the guide's own prose makes has a row
# here at all — since that needs the guide itself in-repo to compare
# against (Task 18's hard set-equality requirement, not this story's).
schema: verdi.guideclaims/v1
