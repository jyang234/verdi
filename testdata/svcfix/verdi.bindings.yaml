# Binds svcfix's upstream producer ids to spec/stale-decline's acceptance
# criteria (I-2: verdi-go stays binding-free; this sidecar is the join).
# The obligation "audit-before-publish" supplies static evidence for ac-1
# and ac-2; the golden flow "refund-flow" (testdata/flows/refund-flow —
# phase 5 grows the actual golden file) supplies behavioral evidence for
# ac-3. Matches examples/showcase/.verdi/specs/active/stale-decline/spec.md's
# acceptance_criteria block.
schema: verdi.bindings/v1
spec: spec/stale-decline
bindings:
  - { producer: audit-before-publish, kind: static, acs: [ac-1, ac-2] }
  - { producer: refund-flow, kind: behavioral, acs: [ac-3] }
