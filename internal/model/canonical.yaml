# verdi's embedded default operating model (verdi.model/v1) — what
# store.Open resolves an absent .verdi/model.yaml to (internal/model/
# embed.go's Canonical()). Expresses today's hardcoded lifecycle exactly:
# internal/artifact/status.go's specFeatureStatuses state set, and the two
# ritual verbs (accept, close) that actually flip a spec's status field in
# cmd/verdi today. TestCanonicalMatchesCode (embed_test.go) proves both
# halves against the code they describe; TestCanonicalYAMLMatchesGoLiteral
# proves this file agrees with canonical.go's canonicalModel Go literal.
#
# A store may override this by committing its own .verdi/model.yaml — v1's
# frontier (dc-1) accepts only vocabulary renames and per-class template
# filename changes on top of this exact shape; any other structural
# deviation is rejected by `verdi model check` (cmd/verdi/model.go).
schema: verdi.model/v1

# The display layer is deliberately empty — no vocabulary block and no
# per-class display labels (spec/vocabulary-surfaces' parity floor: with
# no model.yaml every display lookup falls back to the bare id, so every
# surface prints byte-identical output). A store's own model.yaml may
# declare display/vocabulary freely — both are frontier-exempt.
classes:
  feature:
    decomposes: stubs
    template: feature.md
  story:
    parent: feature
    template: story.md

lifecycle:
  feature:
    states: [draft, accepted-pending-build, closed, superseded]
    terminal: [closed, superseded]
    transitions:
      - verb: accept
        from: draft
        to: accepted-pending-build
        obligations:
          - { scheme: attestation, kind: author-vouch }
      - verb: close
        from: accepted-pending-build
        to: closed
        obligations:
          - { scheme: attestation, kind: countersign, count: 1 }
          - { scheme: behavioral, kind: fold-green }
  story:
    states: [draft, accepted-pending-build, closed, superseded]
    terminal: [closed, superseded]
    transitions:
      - verb: accept
        from: draft
        to: accepted-pending-build
        obligations:
          - { scheme: attestation, kind: author-vouch }
      - verb: close
        from: accepted-pending-build
        to: closed
        obligations:
          - { scheme: attestation, kind: countersign, count: 1 }
          - { scheme: behavioral, kind: fold-green }
