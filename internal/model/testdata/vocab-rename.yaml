# dc-1's frontier fixture: structurally IDENTICAL to canonical.yaml (same
# classes, states, transitions, obligations) but with vocabulary renames and
# different per-class template filenames — the frontier's two named
# exceptions (validate.go's checkFrontier). Must decode and validate clean.
# The classes block renames every class word a surface can speak — feature,
# story, and the spike pseudo-class (the L-M13 carve validateVocabulary
# admits) — so the e2e vocab store built from this file (cmd/e2eharness/
# provision_vocab.go) can prove the rename reaches client-side JS prose:
# the sticky menu's STICKY_TYPES labels and the proto-yarn dialog copy
# (judged-client-js-prose-has-no-browser-proof).
schema: verdi.model/v1

classes:
  feature:
    display: Feature
    decomposes: stubs
    template: custom-feature.md
  story:
    display: Story
    parent: feature
    template: custom-story.md

lifecycle:
  feature:
    states: [draft, accepted-pending-build, closed, superseded]
    terminal: [closed, superseded]
    transitions:
      - verb: accept
        from: draft
        to: accepted-pending-build
        obligations:
          - { scheme: attestation, kind: author-vouch }
      - verb: close
        from: accepted-pending-build
        to: closed
        obligations:
          - { scheme: attestation, kind: countersign, count: 1 }
          - { scheme: behavioral, kind: fold-green }
  story:
    states: [draft, accepted-pending-build, closed, superseded]
    terminal: [closed, superseded]
    transitions:
      - verb: accept
        from: draft
        to: accepted-pending-build
        obligations:
          - { scheme: attestation, kind: author-vouch }
      - verb: close
        from: accepted-pending-build
        to: closed
        obligations:
          - { scheme: attestation, kind: countersign, count: 1 }
          - { scheme: behavioral, kind: fold-green }

vocabulary:
  verbs:
    accept: "Sign off"
  states:
    accepted-pending-build: "Ready to build"
  classes:
    feature: "Initiative"
    story: "Workstream"
    spike: "Timebox"
