# Violates: no transition's `from` may be a terminal state — terminal states
# freeze (Lifecycle.validate, validate.go; guide C-2: "terminal ⇒ freeze";
# judged-terminal-freeze-not-kernel). "closed" is terminal, yet the "reopen"
# transition departs it. Every other kernel rule holds: both endpoints are
# declared, obligations are present ([]), terminal ⊆ states, and all states
# are reachable — so this fixture trips EXACTLY this rule and no other.
schema: verdi.model/v1
classes:
  feature:
    display: Feature
    template: feature.md
lifecycle:
  feature:
    states: [draft, accepted-pending-build, closed]
    terminal: [closed]
    transitions:
      - verb: accept
        from: draft
        to: accepted-pending-build
        obligations:
          - { scheme: attestation, kind: author-vouch }
      - verb: close
        from: accepted-pending-build
        to: closed
        obligations:
          - { scheme: behavioral, kind: fold-green }
      - verb: reopen
        from: closed
        to: accepted-pending-build
        obligations: []
