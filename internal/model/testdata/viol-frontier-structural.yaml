# dc-1's frontier fixture: a WELL-FORMED model (every kernel rule in
# validate.go's Validate holds) that still describes a DIFFERENT lifecycle
# than today's canonical one — an extra "reopen" transition on the feature
# class, not present in canonicalModel (canonical.go). Must decode and pass
# Validate, then fail checkFrontier with the pinned frontier text.
schema: verdi.model/v1

classes:
  feature:
    display: Feature
    decomposes: stubs
    template: feature.md
  story:
    display: Story
    parent: feature
    template: story.md

lifecycle:
  feature:
    states: [draft, accepted-pending-build, closed, superseded]
    terminal: [closed, superseded]
    transitions:
      - verb: accept
        from: draft
        to: accepted-pending-build
        obligations:
          - { scheme: attestation, kind: author-vouch }
      - verb: close
        from: accepted-pending-build
        to: closed
        obligations:
          - { scheme: attestation, kind: countersign, count: 1 }
          - { scheme: behavioral, kind: fold-green }
      - verb: reopen
        from: closed
        to: accepted-pending-build
        obligations: []
  story:
    states: [draft, accepted-pending-build, closed, superseded]
    terminal: [closed, superseded]
    transitions:
      - verb: accept
        from: draft
        to: accepted-pending-build
        obligations:
          - { scheme: attestation, kind: author-vouch }
      - verb: close
        from: accepted-pending-build
        to: closed
        obligations:
          - { scheme: attestation, kind: countersign, count: 1 }
          - { scheme: behavioral, kind: fold-green }
