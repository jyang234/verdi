# judged-frontier-obligations-positional: canonical in every structural
# respect but for the ORDER of the close transition's two obligations —
# fold-green listed before countersign, the reverse of canonical.go. dc-1
# draws the frontier over the "obligation set", so declaration order carries
# no structural meaning; this manifest must decode and validate clean.
schema: verdi.model/v1

classes:
  feature:
    display: Feature
    decomposes: stubs
    template: feature.md
  story:
    display: Story
    parent: feature
    template: story.md

lifecycle:
  feature:
    states: [draft, accepted-pending-build, closed, superseded]
    terminal: [closed, superseded]
    transitions:
      - verb: accept
        from: draft
        to: accepted-pending-build
        obligations:
          - { scheme: attestation, kind: author-vouch }
      - verb: close
        from: accepted-pending-build
        to: closed
        obligations:
          - { scheme: behavioral, kind: fold-green }
          - { scheme: attestation, kind: countersign, count: 1 }
  story:
    states: [draft, accepted-pending-build, closed, superseded]
    terminal: [closed, superseded]
    transitions:
      - verb: accept
        from: draft
        to: accepted-pending-build
        obligations:
          - { scheme: attestation, kind: author-vouch }
      - verb: close
        from: accepted-pending-build
        to: closed
        obligations:
          - { scheme: behavioral, kind: fold-green }
          - { scheme: attestation, kind: countersign, count: 1 }
