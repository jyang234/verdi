# Violates: every transition's from/to must name a declared state
# (Lifecycle.validate, validate.go) — "nonexistent-state" is not in states.
schema: verdi.model/v1
classes:
  feature:
    display: Feature
    template: feature.md
lifecycle:
  feature:
    states: [draft, accepted-pending-build]
    terminal: [accepted-pending-build]
    transitions:
      - verb: accept
        from: nonexistent-state
        to: accepted-pending-build
        obligations:
          - { scheme: attestation, kind: author-vouch }
